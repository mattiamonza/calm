version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: calm
      POSTGRES_PASSWORD: calm
      POSTGRES_DB: calm
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis
